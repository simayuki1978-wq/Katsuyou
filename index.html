    <style>
        :root {
            --primary: #58cc02; --dark-green: #46a302; --bg: #ffffff; --text: #4b4b4b;
            --card-bg: #ffffff; --border: #e5e5e5; --accent: #1cb0f6;
        }
        [data-theme="dark"] {
            --primary: #58cc02; --dark-green: #46a302; --bg: #131f24; --text: #eeeeee;

```
    body {
        margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg); color: var(--text);
        display: flex; justify-content: center;
        transition: background-color 0.3s, color 0.3s;
    }

    #app {
        width: 100%; max-width: 500px; height: 100vh;
        display: flex; flex-direction: column; position: relative;
        background-color: var(--bg); color: var(--text);
        transition: background-color 0.3s, color 0.3s;
    }

    /* ヘッダー */
    .header {
        padding: 15px; display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid var(--border);
        background-color: var(--bg); color: var(--text);
    }
    .header-title { font-weight: bold; font-size: 16px; color: var(--text); }

    .screen { display: none; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; background-color: var(--bg); color: var(--text); }
    .active { display: flex; }

    /* ボタン */
    .btn {
        background: var(--primary); color: white; border: none; border-bottom: 4px solid var(--dark-green);
        padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
        margin-bottom: 15px; text-align: center; text-decoration: none; display: block; width: 100%; box-sizing: border-box;
    }
    .btn:active { transform: translateY(2px); border-bottom-width: 2px; }
    .btn-blue { background: var(--accent); border-bottom-color: #1899d6; }
    .btn-sub {
        background: var(--card-bg); border: 2px solid var(--border); border-bottom-width: 2px;
        color: var(--text);
    }

    /* 活用表 */
    .table-container { overflow-x: auto; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td {
        border: 1px solid var(--border);
        padding: 8px 4px; text-align: center;
        background-color: var(--card-bg);
        color: var(--text);
        font-size: 12px; white-space: normal; min-width: 60px;
    }
    th { background-color: var(--primary); color: white; font-weight: bold; }

    /* フラッシュカード */
    .card-container { perspective: 1000px; flex: 1; min-height: 300px; margin: 20px 0; }
    .card {
        width: 100%; height: 100%; position: relative; transition: transform 0.6s;
        transform-style: preserve-3d; cursor: pointer;
    }
    .card.is-flipped { transform: rotateY(180deg); }
    .card-face {
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        border: 2px solid var(--border); border-radius: 25px;
        background-color: var(--card-bg); color: var(--text);
        padding: 20px; box-sizing: border-box;
        box-shadow: 0 4px 0 var(--border); font-size: clamp(16px, 5vw, 24px); text-align: center;
    }
    .card-back { transform: rotateY(180deg); overflow-y: auto; }
    .card-hint { font-size: 12px; color: #aaa; margin-top: 10px; }

    /* クイズ */
    #quiz-q-container {
        position: relative; min-height: 150px; margin-bottom: 20px;
        border: 2px solid var(--border); border-radius: 25px;
        background-color: var(--card-bg); color: var(--text);
        display: flex; align-items: center; justify-content: center;
        padding: 20px; box-sizing: border-box; text-align: center;
        box-shadow: 0 4px 0 var(--border);
    }
    #quiz-feedback { font-weight: bold; font-size: 22px; margin: 10px 0; height: 30px; text-align: center; }
    #quiz-answer-reveal {
        font-size: 16px; color: #ff4b4b; margin-bottom: 8px;
        min-height: 24px; text-align: center; font-weight: bold;
    }
    .quiz-input {
        width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--border);
        margin-bottom: 10px; font-size: 18px; box-sizing: border-box;
        background-color: var(--card-bg); color: var(--text);
    }
    .quiz-input:focus { outline: none; border-color: var(--primary); }

    .nav-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mode-toggle {
        font-size: 12px; cursor: pointer; padding: 5px 10px;
        border: 1px solid var(--border); border-radius: 10px;
        background-color: var(--card-bg); color: var(--text);
        transition: background-color 0.3s, color 0.3s;
    }

    /* エラー表示 */
    .error-msg { color: #ff4b4b; text-align: center; padding: 20px; }
</style>

        <button class="btn btn-blue" onclick="openFlashcard('verb')">📘 動詞カード</button>

        <div id="main-card" class="card" onclick="this.classList.toggle('is-flipped')">

</div>

<script>
    // ===== データURL =====
    const URLS = {
        system:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1804971889&single=true&output=csv",
        verb:    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=257174721&single=true&output=csv",
        adj:     "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1428601861&single=true&output=csv",
        example: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=2070601702&single=true&output=csv"
    };

    let dataStore = { system: [], verb: [], adj: [], example: [] };
    let currentMode = '';
    let currentIndex = 0;
    let currentQuizItem = null;
    let quizColIdx = 4;
    let quizWaitingNext = false;

    function parseCSV(text) {
        const rows = [];
        let row = [];
        let cell = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            const next = text[i + 1];

            if (inQuotes) {
                if (ch === '"' && next === '"') {
                    cell += '"'; i++;
                } else if (ch === '"') {
                    inQuotes = false;
                } else {
                    cell += ch;
                }
            } else {
                if (ch === '"') {
                    inQuotes = true;
                } else if (ch === ',') {
                    row.push(cell.trim()); cell = '';
                } else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                    if (ch === '\r') i++;
                    row.push(cell.trim()); cell = '';
                    if (row.some(c => c !== '')) rows.push(row);
                    row = [];
                } else if (ch === '\r') {
                    row.push(cell.trim()); cell = '';
                    if (row.some(c => c !== '')) rows.push(row);
                    row = [];
                } else {
                    cell += ch;
                }
            }
        }
        if (cell !== '' || row.length > 0) {
            row.push(cell.trim());
            if (row.some(c => c !== '')) rows.push(row);
        }
        return rows;
    }

    async function fetchData(key) {
        if (dataStore[key].length > 0) return dataStore[key];
        try {
            const res = await fetch(URLS[key]);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            dataStore[key] = parseCSV(text);
            return dataStore[key];
        } catch (e) {
            console.error(`fetchData(${key}) failed:`, e);
            return [];
        }
    }

    const SCREEN_TITLES = {
        'top-screen':   '日本語活用マスター',
        'table-screen': '📋 活用システム',
        'card-screen':  '📘 フラッシュカード',
        'quiz-screen':  '🎯 クイズ'
    };

    function showScreen(id, title) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-title').innerText = SCREEN_TITLES[id] || title || id;
    }

    function toggleDarkMode() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    async function openConjugation() {
        showScreen('table-screen');
        const data = await fetchData('system');
        if (data.length === 0) {
            document.getElementById('table-content').innerHTML = '<p class="error-msg">データの読み込みに失敗しました。</p>';
            return;
        }

        let html = '<table>';
        data.forEach((row, i) => {
            html += '<tr>';
            for (let j = 0; j <= 6; j++) {
                const cell = row[j] !== undefined ? row[j] : '';
                const formatted = cell.replace(/\+/g, '<br>+');
                html += i === 0 ? `<th>${formatted}</th>` : `<td>${formatted}</td>`;
            }
            html += '</tr>';
        });
        document.getElementById('table-content').innerHTML = html + '</table>';
    }

    async function openFlashcard(mode) {
        currentMode = mode;
        showScreen('card-screen');
        document.getElementById('card-front-content').innerHTML = '読み込み中...';
        document.getElementById('card-back-content').innerHTML = '';

        const data = await fetchData(mode);

        if (data.length <= 1) {
            document.getElementById('card-front-content').innerHTML = '<span class="error-msg">データがありません</span>';
            return;
        }

        currentIndex = parseInt(localStorage.getItem(`pos_${mode}`)) || 1;
        if (currentIndex >= data.length) currentIndex = 1;
        renderCard();
    }

    function renderCard() {
        const data = dataStore[currentMode];

        if (!data || !data[currentIndex]) {
            document.getElementById('card-front-content').innerHTML = '<span class="error-msg">カードが見つかりません</span>';
            return;
        }

        const row = data[currentIndex];
        document.getElementById('main-card').classList.remove('is-flipped');

        document.getElementById('card-progress').innerText =
            `${currentIndex} / ${data.length - 1}`;

        let frontContent, backContent;
        if (currentMode === 'example') {
            frontContent = row.slice(0, 3).filter(Boolean).join('<br>');
            backContent  = row.slice(3).filter(Boolean).join('<br>');
        } else {
            frontContent = row.slice(0, 4).filter(Boolean).join('<br>');
            backContent  = row.slice(4).filter(Boolean).join('<br>');
        }

        document.getElementById('card-front-content').innerHTML =
            frontContent + '<br><span class="card-hint">タップで答えを確認</span>';
        document.getElementById('card-back-content').innerHTML = backContent || '（裏面データなし）';

        localStorage.setItem(`pos_${currentMode}`, currentIndex);
    }

    function nextCard() {
        if (currentIndex < dataStore[currentMode].length - 1) {
            currentIndex++;
            renderCard();
        }
    }

    function prevCard() {
        if (currentIndex > 1) {
            currentIndex--;
            renderCard();
        }
    }

    async function openQuiz() {
        showScreen('quiz-screen');
        await fetchData('verb');
        if (dataStore.verb.length <= 1) {
            document.getElementById('quiz-question').innerHTML = '<span class="error-msg">データの読み込みに失敗しました。</span>';
            return;
        }
        quizWaitingNext = false;
        newQuiz();
    }

    function newQuiz() {
        const pool = dataStore.verb.slice(1);
        currentQuizItem = pool[Math.floor(Math.random() * pool.length)];
        const headers = dataStore.verb[0];

        quizColIdx = Math.floor(Math.random() * (currentQuizItem.length - 4)) + 4;
        const formName = headers[quizColIdx] || 'その';

        document.getElementById('quiz-question').innerHTML =
            `「${currentQuizItem[0]}（${currentQuizItem[1]}）」の<br><strong>${formName}</strong> のかたちは？`;
        document.getElementById('quiz-answer').value = '';
        document.getElementById('quiz-feedback').innerText = '';
        document.getElementById('quiz-answer-reveal').innerText = '';
        document.getElementById('quiz-answer').disabled = false;
        document.getElementById('quiz-answer').focus();
        quizWaitingNext = false;
    }

    function checkAnswer() {
        if (quizWaitingNext) {
            newQuiz();
            return;
        }

        const userAns = document.getElementById('quiz-answer').value.trim();
        if (!userAns) return;

        const feedback = document.getElementById('quiz-feedback');
        const reveal   = document.getElementById('quiz-answer-reveal');

        const isCorrect = currentQuizItem.some((val, idx) =>
            idx >= 4 && val.trim() === userAns
        );

        if (isCorrect) {
            feedback.style.color = 'var(--primary)';
            feedback.innerText = '✅ 正解！';
            reveal.innerText = '';
            document.getElementById('quiz-answer').disabled = true;
            setTimeout(newQuiz, 1000);
        } else {
            feedback.style.color = '#ff4b4b';
            feedback.innerText = '❌ ちがうよ！';
            reveal.innerText = `正解：${currentQuizItem[quizColIdx]}`;
            document.getElementById('quiz-answer').disabled = true;
            quizWaitingNext = true;
            document.querySelector('#quiz-screen .btn:not(.btn-sub)').innerText = '次の問題へ →';
            setTimeout(() => {
                document.querySelector('#quiz-screen .btn:not(.btn-sub)').innerText = '答え合わせ';
            }, 100);
        }

        if (isCorrect) {
            setTimeout(() => {
                document.querySelector('#quiz-screen .btn:not(.btn-sub)').innerText = '答え合わせ';
            }, 1000);
        }
    }
</script>

</body>
</html>
