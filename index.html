<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日本語活用アプリ</title>

<style>
:root {
    --bg:#f5f7fb;
    --card:#fff;
    --text:#222;
    --accent:#58cc02;
}
body.dark {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#fff;
}
body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.screen { display:none; padding:20px; }
.active { display:block; }

/* TOP縦並び */
#top {
    display:flex;
    flex-direction:column;
    align-items:center;
}
#top button {
    width:80%;
    max-width:300px;
}

button {
    padding:15px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:18px;
    background:var(--accent);
    color:white;
}

#darkToggle {
    position:fixed;
    top:10px;
    right:10px;
}

/* テーブル */
.table-wrap {
    overflow:auto;
    max-height:80vh;
}

/* カード */
.card-container {
    perspective:1000px;
    width:90%;
    max-width:400px;
    height:250px;
    margin:20px auto;
}
.card-inner {
    transition:transform 0.6s;
    transform-style:preserve-3d;
    width:100%;
    height:100%;
}
.card-inner.flip { transform:rotateY(180deg); }

.card-face {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-size:22px;
    border-radius:20px;
    background:var(--card);
    backface-visibility:hidden;
}
.card-back { transform:rotateY(180deg); }

input {
    padding:10px;
    font-size:18px;
    width:80%;
    border-radius:10px;
}
</style>
</head>

<body>

<button id="darkToggle">🌙</button>

<!-- TOP -->
<div id="top" class="screen active">
<h1>日本語活用アプリ</h1>
<button onclick="loadSystem()">活用システム</button>
<button onclick="startCards('verb')">動詞</button>
<button onclick="startCards('adj')">形容詞</button>
<button onclick="startQuiz()">クイズ</button>
<button onclick="startReview()">復習モード</button>
</div>

<!-- SYSTEM -->
<div id="system" class="screen">
<h2>活用システム</h2>
<div class="table-wrap" id="table"></div>
<button onclick="goTop()">戻る</button>
</div>

<!-- CARD -->
<div id="cardScreen" class="screen">
<h2>フラッシュカード</h2>

<div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
        <div class="card-face" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack"></div>
    </div>
</div>

<button onclick="prevCard()">まえへ</button>
<button onclick="nextCard()">つぎへ</button>
<button onclick="goTop()">戻る</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h2 id="qText"></h2>

<input id="answer">
<button onclick="checkAnswer()">回答</button>

<p id="result"></p>

<div>
スコア:<span id="score">0</span> |
コンボ:<span id="combo">0</span> |
ベスト:<span id="best">0</span>
</div>

<button onclick="loadSystem()">活用システム</button>
<button onclick="goTop()">戻る</button>
</div>

<script>
// ===== 画面切替 =====
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
function goTop(){ show('top'); }

// ===== CSV =====
function parseCSV(text){
 return text.trim().split("\n")
   .map(r=>r.split(","))
   .filter(r=>r.length>1);
}

// ===== URL =====
const URLS = {
 system:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1804971889&output=csv",
 verb:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=257174721&output=csv",
 adj:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1428601861&output=csv"
};

// ===== ダークモード =====
darkToggle.onclick=()=>document.body.classList.toggle("dark");

// ===== SYSTEM（A〜F列のみ）=====
async function loadSystem(){
 show('system');
 let data=parseCSV(await (await fetch(URLS.system)).text());

 let html="<table border=1>";
 data.forEach(r=>{
  html+="<tr>"+r.slice(0,6).map(c=>`<td>${c}</td>`).join("")+"</tr>";
 });
 html+="</table>";

 table.innerHTML=html;
}

// ===== CARD =====
let cards=[],index=0,type="";

async function startCards(t){
 type=t;
 show('cardScreen');

 cards=parseCSV(await (await fetch(URLS[t])).text());
 index=0;
 renderCard();
}

function renderCard(){
 let c=cards[index];
 if(!c) return;

 cardFront.innerHTML=c.slice(0,4).join("<br>");
 cardBack.innerHTML=c.slice(4).join("<br>");
}

function flipCard(){ cardInner.classList.toggle("flip"); }

function nextCard(){
 index=(index+1)%cards.length;
 cardInner.classList.remove("flip");
 renderCard();
}

function prevCard(){
 index=(index-1+cards.length)%cards.length;
 cardInner.classList.remove("flip");
 renderCard();
}

// ===== QUIZ =====
let quizData=[],currentQ;

async function startQuiz(){
 show('quiz');

 let [v,a]=await Promise.all([
  fetch(URLS.verb).then(r=>r.text()),
  fetch(URLS.adj).then(r=>r.text())
 ]);

 quizData=[...parseCSV(v),...parseCSV(a)];
 nextQuestion();
}

function nextQuestion(){
 currentQ=quizData[Math.floor(Math.random()*quizData.length)];
 qText.innerText=`${currentQ[0]} の ${currentQ[1]} のかたちは？`;
 answer.value="";
 result.innerText="";
}

function checkAnswer(){
 let ans=answer.value.trim();
 let correct=currentQ.slice(4).join("");

 if(correct.includes(ans)){
  result.innerText="OK！";
 }else{
  result.innerText="ちがうよ！";
 }

 setTimeout(nextQuestion,800);
}
</script>

</body>
</html>
