<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語学習システム</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* ===== 画面制御 ===== */
.screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    display: none;
    overflow-y: auto;

    background: #fff;
    padding: 20px;
    box-sizing: border-box;
}

.active {
    display: block;
    z-index: 10;
}

/* ===== ボタン ===== */
button {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    font-size: 16px;
}

/* ===== フラッシュカード ===== */
.card {
    max-width: 400px;
    min-height: 120px;
    margin: 40px auto;
    padding: 20px;

    border: 2px solid #333;
    font-size: 18px;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    cursor: pointer;

    /* ← ここ重要（重なり防止） */
    white-space: normal;
    word-break: break-word;
    overflow-wrap: break-word;
}

/* 下のボタンとの距離確保 */
.controls {
    margin-top: 30px;
}
</style>
</head>

<body>

<!-- ===== TOP ===== -->
<div id="top" class="screen active">
    <h1>TOP</h1>
    <button onclick="go('katsuyou')">活用システム</button>
    <button onclick="go('verb')">動詞フラッシュカード</button>
    <button onclick="go('adj')">形容詞フラッシュカード</button>
    <button onclick="go('test')">テスト</button>
</div>

<!-- ===== 活用 ===== -->
<div id="katsuyou" class="screen">
    <h1>活用システム</h1>
    <p>ここにスプレッドシートデータ</p>
    <button onclick="go('top')">戻る</button>
</div>

<!-- ===== 動詞 ===== -->
<div id="verb" class="screen">
    <h1>動詞カード</h1>

    <div class="card" id="verbCard" onclick="flipVerb()"></div>

    <div class="controls">
        <button onclick="nextVerb()">次へ</button>
        <button onclick="go('top')">戻る</button>
    </div>
</div>

<!-- ===== 形容詞 ===== -->
<div id="adj" class="screen">
    <h1>形容詞カード</h1>

    <div class="card" id="adjCard" onclick="flipAdj()"></div>

    <div class="controls">
        <button onclick="nextAdj()">次へ</button>
        <button onclick="go('top')">戻る</button>
    </div>
</div>

<!-- ===== テスト ===== -->
<div id="test" class="screen">
    <h1>テスト</h1>

    <p id="question" style="font-size:20px;"></p>

    <button onclick="nextQuestion()">次の問題</button>
    <button onclick="go('top')">戻る</button>
</div>

<script>

/* ===== 画面切替 ===== */
function go(id){
    document.querySelectorAll('.screen').forEach(s=>{
        s.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    // ← ここ重要：テスト画面に入ったら必ず問題表示
    if(id === "test"){
        showQuestion();
    }
}

/* ===== 動詞 ===== */
const verbs = [
    {f:"食べる", b:"食べます / 食べた / 食べない / 食べられる"},
    {f:"行く", b:"行きます / 行った / 行かない / 行ける"}
];

let vi=0, vf=false;

function showVerb(){
    document.getElementById("verbCard").textContent = verbs[vi].f;
    vf=false;
}

function flipVerb(){
    const c = document.getElementById("verbCard");
    c.textContent = vf ? verbs[vi].f : verbs[vi].b;
    vf = !vf;
}

function nextVerb(){
    vi = (vi+1)%verbs.length;
    showVerb();
}

/* ===== 形容詞 ===== */
const adjs = [
    {f:"高い", b:"高い / 高かった / 高くない / 高くなかった"},
    {f:"安い", b:"安い / 安かった / 安くない / 安くなかった"}
];

let ai=0, af=false;

function showAdj(){
    document.getElementById("adjCard").textContent = adjs[ai].f;
    af=false;
}

function flipAdj(){
    const c = document.getElementById("adjCard");
    c.textContent = af ? adjs[ai].f : adjs[ai].b;
    af = !af;
}

function nextAdj(){
    ai = (ai+1)%adjs.length;
    showAdj();
}

/* ===== テスト ===== */
const qs = [
    "食べる → ます形は？",
    "行く → 可能形は？",
    "高い → 過去形は？"
];

let qi=0;

function showQuestion(){
    document.getElementById("question").textContent = qs[qi];
}

function nextQuestion(){
    qi = (qi+1)%qs.length;
    showQuestion();
}

/* 初期表示 */
showVerb();
showAdj();

</script>

</body>
</html>
