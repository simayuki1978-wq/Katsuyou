<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Learning Master Pro v4</title>
    <style>
        :root {
            --bg: #f7f9fc; --card: #ffffff; --text: #1c1c1e; --accent: #58cc02;
            --blue: #1cb0f6; --orange: #ff9600; --sub: #afafaf; --border: #e5e5e5;
        }
        body.dark {
            --bg: #131f24; --card: #1c2e36; --text: #f5f5f7; --accent: #78d633;
            --blue: #1cb0f6; --orange: #ff9600; --sub: #84949c; --border: #3c4c52;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; transition: background 0.3s; }
        
        /* Navigation */
        nav { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 2px solid var(--border); position: sticky; top:0; z-index:100; }
        .btn-home { padding: 6px 12px; border-radius: 12px; border: 2px solid var(--border); background: none; color: var(--text); font-size: 11px; font-weight: 700; cursor: pointer; }
        
        /* Screens */
        .screen { display: none; width: 100%; min-height: calc(100vh - 60px); flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        
        /* Menu Buttons */
        .menu-title { font-size: 1.8rem; font-weight: 900; color: var(--blue); margin: 20px 0; text-align: center; line-height: 1.2; }
        .btn-menu { width: 100%; max-width: 300px; padding: 22px; margin: 12px 0; background: var(--card); border: 2px solid var(--border); border-bottom: 6px solid var(--border); border-radius: 20px; font-size: 1.2rem; font-weight: 800; color: var(--text); cursor: pointer; transition: all 0.1s; }
        .btn-menu:active { transform: translateY(3px); border-bottom-width: 2px; }
        
        .all-color { border-color: #9b59b6; color: #9b59b6; }
        .v-color { border-color: var(--blue); color: var(--blue); }
        .a-color { border-color: var(--orange); color: var(--orange); }
        .q-color { border-color: var(--accent); color: var(--accent); }

        /* Rules Table */
        table.rules-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; font-size: 0.85rem; margin-top: 10px; }
        table.rules-table th, table.rules-table td { border: 1px solid var(--border); padding: 12px 8px; text-align: center; }
        table.rules-table th { background: var(--blue); color: white; }
        table.rules-table tr:nth-child(even) { background: rgba(0,0,0,0.02); }

        /* Card System */
        .card { width: 100%; max-width: 420px; background: var(--card); border-radius: 28px; border: 2px solid var(--border); border-bottom: 8px solid var(--border); padding: 25px; box-sizing: border-box; margin-bottom: 20px; }
        .card-top { border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 15px; text-align: center; }
        .card-kanji { font-size: 3.2rem; font-weight: 900; margin: 0; color: var(--text); }
        .card-yomi { font-size: 1.4rem; color: var(--sub); font-weight: 600; }
        .card-meanings { margin-top: 12px; font-weight: 800; color: var(--blue); font-size: 1.1rem; background: rgba(28, 176, 246, 0.1); padding: 8px; border-radius: 12px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1.5px solid var(--border); }
        .info-row:last-child { border: none; }
        .info-label { color: var(--sub); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-val { font-weight: 700; font-size: 1.1rem; color: var(--text); }

        /* Quiz System */
        .quiz-box { width: 100%; max-width: 400px; text-align: center; background: var(--card); padding: 35px; border-radius: 28px; border: 2px solid var(--border); border-bottom: 8px solid var(--border); }
        .q-input { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid var(--border); font-size: 1.4rem; text-align: center; margin: 25px 0; background: var(--bg); color: var(--text); outline: none; }
        .feedback { font-weight: 900; font-size: 1.4rem; margin-top: 15px; min-height: 1.6em; }

        /* Controls */
        .controls { display: flex; gap: 15px; width: 100%; max-width: 420px; }
        .btn-ctrl { flex: 1; padding: 18px; border-radius: 18px; border: none; background: var(--blue); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 0 #1899d6; }
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 2px 0 #1899d6; }
    </style>
</head>
<body>

<nav>
    <button class="btn-home" onclick="location.reload()">HOME</button>
    <div id="status" style="font-size: 10px; font-weight: 900; letter-spacing: 1px;">SYNCING...</div>
    <button class="btn-home" onclick="document.body.classList.toggle('dark')">DARK</button>
</nav>

<div id="scr-top" class="screen active">
    <h1 class="menu-title">J-LEARNING<br>MASTER</h1>
    <button class="btn-menu all-color" id="btn-rules" onclick="showAllRules()" disabled>活用のすべて (読込中...)</button>
    <button class="btn-menu v-color" id="btn-v" onclick="startMode('verb')" disabled>動詞 (読込中...)</button>
    <button class="btn-menu a-color" id="btn-a" onclick="startMode('adj')" disabled>形容詞 (読込中...)</button>
    <button class="btn-menu q-color" id="btn-q" onclick="startMode('quiz')" disabled>混合クイズ</button>
</div>

<div id="scr-all-rules" class="screen">
    <h2 class="menu-title" style="font-size: 1.4rem;">動詞活用のルール</h2>
    <div id="rules-container" style="width: 100%; max-width: 600px; overflow-x: auto;"></div>
    <div class="controls" style="margin-top: 20px;">
        <button class="btn-ctrl" style="background: var(--sub); box-shadow: 0 5px 0 #888;" onclick="showScreen('scr-top')">戻る</button>
    </div>
</div>

<div id="scr-quiz" class="screen">
    <div class="quiz-box" style="padding: 20px; width: 90%; max-width: 380px;">
        <div style="margin: 10px 0;">
            <div id="q-word" style="font-size: 2.8rem; font-weight: 900; color: var(--blue); line-height: 1.2;">--</div>
            <div id="q-yomi" style="font-size: 1.1rem; color: var(--sub); font-weight: 600; margin-top: 5px;">--</div>
        </div>
        
        <div style="font-size: 1.1rem; margin-top: 15px;">
            の <b id="q-form" style="color:var(--orange); text-decoration: underline;">--</b> は？
        </div>

        <input type="text" id="q-input" class="q-input" 
               style="width: 100%; max-width: 280px; padding: 12px; margin: 20px 0; font-size: 1.2rem; box-sizing: border-box;" 
               placeholder="答えを入力" autocomplete="off">
        
        <div id="q-feedback" class="feedback" style="font-size: 1.1rem;"></div>
    </div>
    
    <div class="controls" style="margin-top: 20px;">
        <button class="btn-ctrl" style="background:var(--accent); box-shadow:0 5px 0 #46a302;" onclick="checkQuiz()">回答</button>
        <button class="btn-ctrl" style="background:var(--sub); box-shadow:0 5px 0 #888;" onclick="nextQuiz()">スキップ</button>
    </div>
</div>

<div id="scr-quiz" class="screen">
    <div class="quiz-box">
        <div id="q-word" style="font-size: 3.5rem; font-weight: 900; color: var(--blue); margin: 15px 0;">--</div>
        <div style="font-size: 1.3rem;">の <b id="q-form" style="color:var(--orange); text-decoration: underline;">--</b> は？</div>
        <input type="text" id="q-input" class="q-input" placeholder="答えを入力" autocomplete="off">
        <div id="q-feedback" class="feedback"></div>
    </div>
    <div class="controls">
        <button class="btn-ctrl" style="background:var(--accent); box-shadow:0 5px 0 #46a302;" onclick="checkQuiz()">回答</button>
        <button class="btn-ctrl" style="background:var(--sub); box-shadow:0 5px 0 #888;" onclick="nextQuiz()">スキップ</button>
    </div>
</div>

<script>
    // --- CSV設定 ---
    const VERB_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=257174721&single=true&output=csv'; 
    const ADJ_CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1428601861&single=true&output=csv';
    const RULES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1804971889&single=true&output=csv';

    let verbs = [], adjs = [], rulesData = [], currentList = [], currentIndex = 0;
    let vHeaders = [], aHeaders = [], currentHeaders = [];
    let quizAns = "";

    // データ読み込み用共通関数
    async function loadData(url) {
        const res = await fetch(url + '&v=' + Date.now());
        const text = await res.text();
        const rows = [];
        const lines = text.split(/\r?\n/);
        lines.forEach(line => {
            if (!line.trim()) return;
            const cells = [];
            let cell = "", inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ""; }
                else cell += char;
            }
            cells.push(cell.trim());
            rows.push(cells);
        });
        return rows;
    }

    // 初期化：すべてのデータを一度に読み込む
    async function init() {
        try {
            const [vData, aData, rData] = await Promise.all([
                loadData(VERB_CSV_URL),
                loadData(ADJ_CSV_URL),
                loadData(RULES_CSV_URL)
            ]);

            vHeaders = vData[0];
            verbs = vData.slice(1).filter(r => r[0] && r[0] !== "1");

            aHeaders = aData[0];
            adjs = aData.slice(1).filter(r => r[0] && r[0] !== "1");

            rulesData = rData;

            // ボタンの有効化
            document.getElementById('btn-v').disabled = false;
            document.getElementById('btn-v').innerText = `動詞 (${verbs.length})`;
            document.getElementById('btn-a').disabled = false;
            document.getElementById('btn-a').innerText = `形容詞 (${adjs.length})`;
            document.getElementById('btn-rules').disabled = false;
            document.getElementById('btn-rules').innerText = "活用のすべて";
            document.getElementById('btn-q').disabled = false;
            
            document.getElementById('status').innerText = "ONLINE";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "SYNC ERROR";
        }
    }

    // 画面切り替え
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ルール表の表示
    function showAllRules() {
        const container = document.getElementById('rules-container');
        let html = '<table class="rules-table">';
        rulesData.forEach((row, index) => {
            html += '<tr>';
            row.forEach(cell => {
                html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
            });
            html += '</tr>';
        });
        html += '</table>';
        container.innerHTML = html;
        showScreen('scr-all-rules');
    }

    // 各モード開始
    function startMode(mode) {
        currentIndex = 0;
        if (mode === 'verb') { currentList = verbs; currentHeaders = vHeaders; updateCard(); showScreen('scr-card'); }
        else if (mode === 'adj') { currentList = adjs; currentHeaders = aHeaders; updateCard(); showScreen('scr-card'); }
        else if (mode === 'quiz') { nextQuiz(); showScreen('scr-quiz'); }
    }

    // カード更新
    function updateCard() {
        const d = currentList[currentIndex];
        document.getElementById('c-kanji').innerText = d[0] || "--";
        document.getElementById('c-yomi').innerText = d[1] || "--";
        document.getElementById('c-meanings').innerText = `${d[2] || '-'} / ${d[3] || '-'}`; 
        
        let html = "";
        for (let i = 4; i < currentHeaders.length; i++) {
            let label = currentHeaders[i];
            let val = d[i];
            if (label && val && !["グループ", "英語", "ベトナム語"].includes(label)) {
                html += `<div class="info-row"><span class="info-label">${label}</span><span class="info-val">${val}</span></div>`;
            }
        }
        document.getElementById('c-list').innerHTML = html;
        window.currentVoice = d[1];
    }

    function next() { if (currentIndex < currentList.length - 1) { currentIndex++; updateCard(); } }
    function prev() { if (currentIndex > 0) { currentIndex--; updateCard(); } }

    // クイズロジック
   function nextQuiz() {
    const isVerb = Math.random() > 0.5;
    const list = isVerb ? verbs : adjs;
    const heads = isVerb ? vHeaders : aHeaders;
    const item = list[Math.floor(Math.random() * list.length)];
    
    const qCols = [];
    for (let i = 4; i < heads.length; i++) {
        if (heads[i] && item[i] && !["グループ", "英語", "ベトナム語"].includes(heads[i])) {
            qCols.push(i);
        }
    }
    
    const col = qCols[Math.floor(Math.random() * qCols.length)];
    
    // 表示の更新
    document.getElementById('q-word').innerText = item[0] || "ERROR";
    document.getElementById('q-yomi').innerText = item[1] || ""; // ふりがなを表示
    document.getElementById('q-form').innerText = heads[col];
    quizAns = item[col];
    
    document.getElementById('q-input').value = "";
    document.getElementById('q-feedback').innerText = "";
    document.getElementById('q-input').focus();
    }

    function checkQuiz() {
        const input = document.getElementById('q-input').value.trim();
        const f = document.getElementById('q-feedback');
        if (!input) return;
        if (input === quizAns) {
            f.style.color = "var(--accent)"; f.innerText = "正解！ 素晴らしい！";
            setTimeout(nextQuiz, 1000);
        } else {
            f.style.color = "#ff4b4b"; f.innerText = `答え: ${quizAns}`;
        }
    }

    document.getElementById('q-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkQuiz(); });

    function speak() {
        if (!window.currentVoice) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(window.currentVoice);
        u.lang = 'ja-JP'; window.speechSynthesis.speak(u);
    }

    init();
</script>
</body>
</html>
