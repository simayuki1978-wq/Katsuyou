<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日本語活用アプリ</title>

<style>
:root {
    --bg:#f5f7fb;
    --card:#fff;
    --text:#222;
    --accent:#58cc02;
}
body.dark {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#fff;
}
body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
    text-align:center;

    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
}
.screen { display:none; padding:20px; }
.active { display:block; }

button {
    padding:15px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:18px;
    background:var(--accent);
    color:white;
}

#darkToggle {
    position:fixed;
    top:10px;
    right:10px;
}

.table-wrap {
    overflow:auto;
    max-height:80vh;
}

/* カード */
.card-container {
    perspective:1000px;
    width:90%;
    max-width:400px;
    height:250px;
    margin:20px auto;
}
.card-inner {
    transition:transform 0.6s;
    transform-style:preserve-3d;
    width:100%;
    height:100%;
}
.card-inner.flip {
    transform:rotateY(180deg);
}
.card-face {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-size:22px;
    border-radius:20px;
    background:var(--card);
    backface-visibility:hidden;
}
.card-back {
    transform:rotateY(180deg);
}

.stats { margin-top:10px; }

input {
    padding:10px;
    font-size:18px;
    width:80%;
    border-radius:10px;
}
</style>
</head>

<body>

<button id="darkToggle">🌙</button>

<div id="top" class="screen active">
<h1>日本語活用アプリ</h1>
<button onclick="loadSystem()">活用システム</button>
<button onclick="startCards('verb')">動詞</button>
<button onclick="startCards('adj')">形容詞</button>
<button onclick="startQuiz()">クイズ</button>
<button onclick="startReview()">復習モード</button>
</div>

<div id="system" class="screen">
<h2>活用システム</h2>
<div class="table-wrap" id="table"></div>
<button onclick="goTop()">戻る</button>
</div>

<div id="cardScreen" class="screen">
<h2 id="cardTitle"></h2>

<div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
        <div class="card-face" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack"></div>
    </div>
</div>

<button onclick="prevCard()">まえへ</button>
<button onclick="nextCard()">つぎへ</button>
<button onclick="goTop()">戻る</button>
</div>

<div id="quiz" class="screen">
<h2 id="qText"></h2>

<input id="answer">
<button onclick="checkAnswer()">回答</button>

<p id="result"></p>

<div class="stats">
スコア: <span id="score">0</span> |
コンボ: <span id="combo">0</span> |
ベスト: <span id="best">0</span>
</div>

<button onclick="loadSystem()">活用システム</button>
<button onclick="goTop()">戻る</button>
</div>

<script>
// ===== 初期化（重要）=====
window.onload = () => {

document.getElementById("darkToggle").onclick = ()=>{
 document.body.classList.toggle("dark");
};

};

// ===== 共通 =====
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
function goTop(){ show('top'); }

function parseCSV(text){
 return text.split("\n").map(r=>r.split(","));
}

// ===== URL =====
const URLS = {
 system: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1804971889&single=true&output=csv",
 verb: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=257174721&single=true&output=csv",
 adj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1428601861&single=true&output=csv"
};

// ===== SYSTEM =====
async function loadSystem(){
 show('system');
 let data = parseCSV(await (await fetch(URLS.system)).text());

 let html="<table border=1>";
 data.forEach(r=>{
  html+="<tr>"+r.map(c=>`<td>${c}</td>`).join("")+"</tr>";
 });
 html+="</table>";

 table.innerHTML=html;
}

// ===== CARD =====
let cards=[], index=0, type="";

async function startCards(t){
 type=t;
 show('cardScreen');

 cards = parseCSV(await (await fetch(URLS[t])).text());
 index = Number(localStorage.getItem(t+"_index"))||0;
 renderCard();
}

function renderCard(){
 let c = cards[index];
 cardFront.innerHTML = c.slice(0,4).join("<br>");
 cardBack.innerHTML = c.slice(4).join("<br>");
}

function flipCard(){
 cardInner.classList.toggle("flip");
}

function nextCard(){
 index=(index+1)%cards.length;
 localStorage.setItem(type+"_index",index);
 cardInner.classList.remove("flip");
 renderCard();
}

function prevCard(){
 index=(index-1+cards.length)%cards.length;
 localStorage.setItem(type+"_index",index);
 cardInner.classList.remove("flip");
 renderCard();
}

// ===== QUIZ =====
let quizData=[], currentQ;
let score=0, combo=0, bestCombo=0;
let wrongList = JSON.parse(localStorage.getItem("wrongList")||"[]");
let reviewMode=false;

async function startQuiz(){
 show('quiz');
 reviewMode=false;
 score=0; combo=0; updateUI();

 let [v,a] = await Promise.all([
  fetch(URLS.verb).then(r=>r.text()),
  fetch(URLS.adj).then(r=>r.text())
 ]);

 quizData=[...parseCSV(v),...parseCSV(a)];
 nextQuestion();
}

function startReview(){
 if(wrongList.length===0){ alert("苦手なし"); return; }
 reviewMode=true;
 show('quiz');
 quizData=wrongList.map(q=>q.split("|"));
 nextQuestion();
}

function nextQuestion(){
 if(reviewMode && wrongList.length===0){
  alert("もういちど！");
  goTop();
  return;
 }

 currentQ = quizData[Math.floor(Math.random()*quizData.length)];

 qText.innerText = `${currentQ[0]} の ${currentQ[1]} のかたちは？`;
 answer.value="";
 result.innerText="";
}

function normalize(s){ return s.replace(/\s/g,""); }

function checkAnswer(){
 let ans = normalize(answer.value);
 let correct = currentQ.slice(4).join("");

 if(correct.includes(ans)){
  score+=10+combo*2;
  combo++;
  if(combo>bestCombo) bestCombo=combo;

  if(reviewMode){
   wrongList=wrongList.filter(q=>q!==currentQ.join("|"));
   localStorage.setItem("wrongList",JSON.stringify(wrongList));
  }

  result.innerText="OK！";

 }else{
  combo=0;
  score=Math.max(0,score-5);

  if(!wrongList.includes(currentQ.join("|"))){
   wrongList.push(currentQ.join("|"));
   localStorage.setItem("wrongList",JSON.stringify(wrongList));
  }

  result.innerText="ちがうよ！";
 }

 updateUI();
 setTimeout(nextQuestion,800);
}

function updateUI(){
 scoreEl.innerText=score;
 comboEl.innerText=combo;
 bestEl.innerText=bestCombo;
}

answer.addEventListener("keydown",e=>{
 if(e.key==="Enter") checkAnswer();
});
</script>

</body>
</html>
